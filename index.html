<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ANYBYTE Ticket">
<title>ANYBYTE Ticket</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjMkI3RkU4Ii8+PHRleHQgeD0iOTAiIHk9IjEwNSIgZm9udC1mYW1pbHk9IkFyaWFsIiBmb250LXNpemU9IjcwIiBmb250LXdlaWdodD0iYm9sZCIgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiPkFCPC90ZXh0Pjwvc3ZnPg==">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --navy: #2B7FE8; --cyan: #00C2FF; --dark: #0f1219; --card: #1a1f2e;
    --card2: #212738; --border: #2a3040; --text: #e8ecf4; --muted: #6b7694;
    --success: #34d399; --error: #f87171;
  }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--dark); color: var(--text);
    min-height: 100dvh; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
    overflow-x: hidden;
  }

  /* PIN SCREEN */
  .pin-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100dvh; padding: 24px;
    background: radial-gradient(ellipse at 20% 50%, rgba(43,127,232,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0,194,255,0.06) 0%, transparent 50%), var(--dark);
  }
  .pin-logo {
    width: 64px; height: 64px; background: linear-gradient(135deg, var(--navy), var(--cyan));
    border-radius: 18px; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 22px; color: white; margin-bottom: 24px;
    box-shadow: 0 8px 32px rgba(43,127,232,0.3);
  }
  .pin-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .pin-subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .pin-dots { display: flex; gap: 16px; margin-bottom: 36px; }
  .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); transition: all 0.2s; }
  .pin-dot.filled { background: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,194,255,0.4); }
  .pin-dot.error { border-color: var(--error); background: var(--error); animation: shake 0.4s ease; }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 72px); gap: 12px; }
  .pin-key {
    width: 72px; height: 56px; background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 500; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; -webkit-user-select: none; user-select: none;
  }
  .pin-key:active { background: var(--navy); border-color: var(--navy); transform: scale(0.93); }
  .pin-key.fn { font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--muted); background: transparent; border-color: transparent; }
  .pin-key.fn:active { color: var(--text); background: var(--card); }

  /* APP SCREEN */
  .app-screen { display: none; flex-direction: column; min-height: 100dvh; }
  .app-header {
    display: flex; align-items: center; gap: 10px; padding: 16px 20px;
    background: var(--card); border-bottom: 1px solid var(--border);
  }
  .app-header-logo {
    width: 32px; height: 32px; background: linear-gradient(135deg, var(--navy), var(--cyan));
    border-radius: 9px; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; color: white;
  }
  .app-header h1 { font-size: 17px; font-weight: 700; }
  .app-body { flex: 1; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

  .upload-zone {
    position: relative; border: 2px dashed var(--border); border-radius: 16px;
    padding: 32px 16px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; cursor: pointer; transition: all 0.25s;
    background: var(--card); min-height: 180px; overflow: hidden;
  }
  .upload-zone:active { border-color: var(--navy); background: rgba(43,127,232,0.05); }
  .upload-zone.has-image { padding: 0; border-style: solid; border-color: var(--navy); }
  .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 40px; opacity: 0.7; }
  .upload-text { font-size: 15px; color: var(--muted); text-align: center; }
  .upload-text strong { color: var(--cyan); }
  .preview-img { display: none; width: 100%; max-height: 280px; object-fit: contain; border-radius: 14px; }
  .upload-zone.has-image .upload-icon, .upload-zone.has-image .upload-text { display: none; }
  .upload-zone.has-image .preview-img { display: block; }
  .remove-img {
    display: none; position: absolute; top: 8px; right: 8px; width: 32px; height: 32px;
    background: rgba(0,0,0,0.7); border: none; border-radius: 50%; color: white; font-size: 18px; cursor: pointer; z-index: 2;
  }
  .upload-zone.has-image .remove-img { display: flex; align-items: center; justify-content: center; }

  .field-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; }
  .field-card label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; display: block; margin-bottom: 8px; }
  .priority-row { display: flex; gap: 8px; }
  .priority-btn {
    flex: 1; padding: 10px 0; background: var(--dark); border: 1px solid var(--border);
    border-radius: 10px; color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .priority-btn.active { color: white; border-color: transparent; }
  .priority-btn[data-p="low"].active { background: #166534; }
  .priority-btn[data-p="medium"].active { background: #854d0e; }
  .priority-btn[data-p="high"].active { background: #c2410c; }
  .priority-btn[data-p="critical"].active { background: #dc2626; }

  .note-input {
    width: 100%; padding: 12px; background: var(--dark); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; resize: none; outline: none; min-height: 60px;
  }
  .note-input::placeholder { color: var(--muted); opacity: 0.5; }
  .note-input:focus { border-color: var(--navy); }

  .submit-btn {
    width: 100%; padding: 16px; background: linear-gradient(135deg, var(--navy), var(--cyan));
    border: none; border-radius: 14px; color: white; font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: auto;
  }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.4; }
  .submit-btn .spinner { display: none; width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .submit-btn.loading .btn-label { display: none; }
  .submit-btn.loading .spinner { display: block; }
  .submit-btn.loading .btn-status { display: block; }
  .btn-status { display: none; font-size: 14px; font-weight: 500; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESULT SCREEN */
  .result-screen {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100dvh; padding: 32px 24px; text-align: center;
    background: radial-gradient(ellipse at 50% 30%, rgba(52,211,153,0.06) 0%, transparent 50%), var(--dark);
  }
  .result-screen.error-state { background: radial-gradient(ellipse at 50% 30%, rgba(248,113,113,0.06) 0%, transparent 50%), var(--dark); }
  .result-check {
    width: 72px; height: 72px; border-radius: 50%; background: rgba(52,211,153,0.12);
    display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 20px;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .error-state .result-check { background: rgba(248,113,113,0.12); }
  @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .result-ticket {
    font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700;
    background: linear-gradient(135deg, var(--navy), var(--cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 8px 0 4px;
  }
  .result-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .result-detail { color: var(--muted); font-size: 14px; line-height: 1.5; max-width: 300px; }
  .result-meta {
    margin-top: 20px; background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 20px; width: 100%; max-width: 320px;
    text-align: left; display: flex; flex-direction: column; gap: 8px;
  }
  .meta-row { display: flex; justify-content: space-between; font-size: 13px; }
  .meta-row .meta-label { color: var(--muted); }
  .meta-row .meta-value { font-weight: 600; }
  .new-ticket-btn {
    margin-top: 24px; padding: 14px 40px; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .new-ticket-btn:active { background: var(--card2); transform: scale(0.97); }

  @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div class="pin-screen" id="pinScreen">
  <div class="pin-logo">AB</div>
  <div class="pin-title">ANYBYTE Ticket</div>
  <div class="pin-subtitle">Inserisci il PIN per accedere</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad">
    <div class="pin-key" onclick="pinPress('1')">1</div>
    <div class="pin-key" onclick="pinPress('2')">2</div>
    <div class="pin-key" onclick="pinPress('3')">3</div>
    <div class="pin-key" onclick="pinPress('4')">4</div>
    <div class="pin-key" onclick="pinPress('5')">5</div>
    <div class="pin-key" onclick="pinPress('6')">6</div>
    <div class="pin-key" onclick="pinPress('7')">7</div>
    <div class="pin-key" onclick="pinPress('8')">8</div>
    <div class="pin-key" onclick="pinPress('9')">9</div>
    <div class="pin-key fn" onclick="pinPress('clear')">C</div>
    <div class="pin-key" onclick="pinPress('0')">0</div>
    <div class="pin-key fn" onclick="pinPress('del')">←</div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app-screen" id="appScreen">
  <div class="app-header">
    <div class="app-header-logo">AB</div>
    <h1>Nuovo Ticket</h1>
  </div>
  <div class="app-body">
    <div class="upload-zone" id="uploadZone">
      <input type="file" accept="image/*" id="fileInput" onchange="handleFile(this)">
      <div class="upload-icon">📸</div>
      <div class="upload-text">Tocca per caricare uno <strong>screenshot</strong><br>della chat WhatsApp</div>
      <img class="preview-img" id="previewImg">
      <button class="remove-img" onclick="removeImage(event)">✕</button>
    </div>
    <div class="field-card">
      <label>Priorità</label>
      <div class="priority-row">
        <button class="priority-btn" data-p="low" onclick="setPriority(this)">Bassa</button>
        <button class="priority-btn active" data-p="medium" onclick="setPriority(this)">Media</button>
        <button class="priority-btn" data-p="high" onclick="setPriority(this)">Alta</button>
        <button class="priority-btn" data-p="critical" onclick="setPriority(this)">Critica</button>
      </div>
    </div>
    <div class="field-card">
      <label>Note aggiuntive (opzionale)</label>
      <textarea class="note-input" id="noteInput" placeholder="Es: urgente, il cliente ha chiamato 3 volte..."></textarea>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitTicket()" disabled>
      <span class="btn-label">Invia Screenshot e Crea Ticket</span>
      <span class="spinner"></span>
      <span class="btn-status" id="btnStatus">Analisi in corso...</span>
    </button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div class="result-screen" id="resultScreen">
  <div class="result-check" id="resultIcon">✓</div>
  <div class="result-title" id="resultTitle">Ticket creato!</div>
  <div class="result-ticket" id="resultTicket"></div>
  <div class="result-detail" id="resultDetail"></div>
  <div class="result-meta" id="resultMeta">
    <div class="meta-row"><span class="meta-label">Cliente</span><span class="meta-value" id="metaClient">—</span></div>
    <div class="meta-row"><span class="meta-label">Oggetto</span><span class="meta-value" id="metaSubject">—</span></div>
    <div class="meta-row"><span class="meta-label">Priorità</span><span class="meta-value" id="metaPriority">—</span></div>
  </div>
  <button class="new-ticket-btn" onclick="resetApp()">Nuovo ticket</button>
</div>

<script>
const WEBHOOK_URL = 'https://automation.anybyte.it/webhook/whatsapp-ticket';
let pinCode = '', currentPriority = 'medium', imageBase64 = null;

function pinPress(key) {
  const dots = document.querySelectorAll('.pin-dot');
  if (key === 'clear') { pinCode = ''; dots.forEach(d => d.className = 'pin-dot'); return; }
  if (key === 'del') { if (pinCode.length > 0) { pinCode = pinCode.slice(0,-1); dots[pinCode.length].className = 'pin-dot'; } return; }
  if (pinCode.length >= 4) return;
  pinCode += key;
  dots[pinCode.length - 1].classList.add('filled');
  if (pinCode.length === 4) setTimeout(validatePin, 200);
}

function validatePin() {
  sessionStorage.setItem('pin', pinCode);
  document.getElementById('pinScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
}

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const ratio = Math.min(1200/w, 1600/h, 1);
      w = Math.round(w * ratio); h = Math.round(h * ratio);
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      imageBase64 = canvas.toDataURL('image/jpeg', 0.85);
      document.getElementById('previewImg').src = imageBase64;
      document.getElementById('uploadZone').classList.add('has-image');
      document.getElementById('submitBtn').disabled = false;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeImage(e) {
  e.stopPropagation(); e.preventDefault();
  imageBase64 = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('uploadZone').classList.remove('has-image');
  document.getElementById('submitBtn').disabled = true;
}

function setPriority(btn) {
  document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPriority = btn.dataset.p;
}

async function submitTicket() {
  if (!imageBase64) return;
  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('btnStatus');
  btn.classList.add('loading'); btn.disabled = true;
  status.textContent = 'Invio screenshot...';
  try {
    const payload = {
      pin: sessionStorage.getItem('pin'),
      image: imageBase64.split(',')[1],
      priority: currentPriority,
      note: document.getElementById('noteInput').value.trim()
    };
    status.textContent = 'Claude sta analizzando...';
    const resp = await fetch(WEBHOOK_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await resp.json();
    if (data.success) { showResult(true, data); }
    else if (data.error === 'invalid_pin') { showPinError(); }
    else { showResult(false, data); }
  } catch(err) { showResult(false, { message: 'Errore di connessione. Riprova.' }); }
  btn.classList.remove('loading'); btn.disabled = false;
}

function showResult(ok, data) {
  document.getElementById('appScreen').style.display = 'none';
  const s = document.getElementById('resultScreen'); s.style.display = 'flex';
  if (ok) {
    s.classList.remove('error-state');
    document.getElementById('resultIcon').textContent = '✓';
    document.getElementById('resultTitle').textContent = 'Ticket creato!';
    document.getElementById('resultTicket').textContent = data.ticket_number || '';
    document.getElementById('resultDetail').textContent = data.message || '';
    document.getElementById('metaClient').textContent = data.client || '—';
    document.getElementById('metaSubject').textContent = data.subject || '—';
    const pl = {low:'🟢 Bassa',medium:'🟡 Media',high:'🟠 Alta',critical:'🔴 Critica'};
    document.getElementById('metaPriority').textContent = pl[currentPriority];
    document.getElementById('resultMeta').style.display = 'flex';
  } else {
    s.classList.add('error-state');
    document.getElementById('resultIcon').textContent = '✗';
    document.getElementById('resultTitle').textContent = 'Errore';
    document.getElementById('resultTicket').textContent = '';
    document.getElementById('resultDetail').textContent = data.message || 'Qualcosa è andato storto';
    document.getElementById('resultMeta').style.display = 'none';
  }
  if (navigator.vibrate) navigator.vibrate(ok ? [100] : [100,50,100]);
}

function showPinError() {
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('pinScreen').style.display = 'flex';
  pinCode = '';
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach(d => d.className = 'pin-dot error');
  document.querySelector('.pin-subtitle').textContent = 'PIN errato. Riprova.';
  document.querySelector('.pin-subtitle').style.color = 'var(--error)';
  setTimeout(() => { dots.forEach(d => d.className = 'pin-dot'); document.querySelector('.pin-subtitle').textContent = 'Inserisci il PIN per accedere'; document.querySelector('.pin-subtitle').style.color = ''; }, 1500);
}

function resetApp() {
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  imageBase64 = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('uploadZone').classList.remove('has-image');
  document.getElementById('noteInput').value = '';
  document.getElementById('submitBtn').disabled = true;
  currentPriority = 'medium';
  document.querySelectorAll('.priority-btn').forEach(b => b.classList.toggle('active', b.dataset.p === 'medium'));
}

if (sessionStorage.getItem('pin')) {
  document.getElementById('pinScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
}
</script>
</body>
</html>
